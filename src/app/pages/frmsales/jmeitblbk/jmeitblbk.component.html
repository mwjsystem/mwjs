<div class="mat-elevation-z8">
    <table mat-table [dataSource]="dataSource" aria-label="Elements">
    <ng-container matColumnDef="line">
      <th mat-header-cell *matHeaderCellDef>行番号</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.line" (blur)="updateList(i, 'line', row.line)">
      </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="day">
      <th mat-header-cell *matHeaderCellDef>受付日</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.day" (blur)="updateList(i, 'day', row.day)">
      </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="sday">
      <th mat-header-cell *matHeaderCellDef>出荷日</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.sday" (blur)="updateList(i, 'sday', row.sday)">
      </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="souko">
      <th mat-header-cell *matHeaderCellDef>倉庫コード</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.souko" (blur)="updateList(i, 'souko', row.souko)">
      </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="gcode">
      <th mat-header-cell *matHeaderCellDef>商品番号</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.gcode" (blur)="updateList(i, 'gcode', row.gcode)">
      </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="gtext">
      <th mat-header-cell *matHeaderCellDef>商品テキスト</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.gtext" (blur)="updateList(i, 'gtext', row.gtext)">
      </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="suu">
      <th mat-header-cell *matHeaderCellDef>数量</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.suu" (blur)="updateList(i, 'suu', row.suu)">
      </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="teika">
      <th mat-header-cell *matHeaderCellDef>定価</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.teika" (blur)="updateList(i, 'teika', row.teika)">
      </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="tanka">
      <th mat-header-cell *matHeaderCellDef>単価</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.tanka" (blur)="updateList(i, 'tanka', row.tanka)">
      </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="money">
      <th mat-header-cell *matHeaderCellDef>金額</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.money" (blur)="updateList(i, 'money', row.money)">
      </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="taxkbn">
      <th mat-header-cell *matHeaderCellDef>税区分</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.taxkbn" (blur)="updateList(i, 'taxkbn', row.taxkbn)">
      </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="mbikou">
      <th mat-header-cell *matHeaderCellDef>明細備考</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.mbikou" (blur)="updateList(i, 'mbikou', row.mbikou)">
      </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="genka">
      <th mat-header-cell *matHeaderCellDef>原価</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.genka" (blur)="updateList(i, 'genka', row.genka)">
      </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="spec">
      <th mat-header-cell *matHeaderCellDef>特殊在庫</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.spec" (blur)="updateList(i, 'spec', row.spec)">
      </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="tintanka">
      <th mat-header-cell *matHeaderCellDef>税込み単価</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.tintanka" (blur)="updateList(i, 'tintanka', row.tintanka)">
      </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="touttanka">
      <th mat-header-cell *matHeaderCellDef>税抜き単価</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.touttanka" (blur)="updateList(i, 'touttanka', row.touttanka)">
      </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="taxtanka">
      <th mat-header-cell *matHeaderCellDef>消費税単価</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.taxtanka" (blur)="updateList(i, 'taxtanka', row.taxtanka)">
      </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="tinmoney">
      <th mat-header-cell *matHeaderCellDef>税込み金額</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.tinmoney" (blur)="updateList(i, 'tinmoney', row.tinmoney)">
      </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="toutmoney">
      <th mat-header-cell *matHeaderCellDef>税抜き金額</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.toutmoney" (blur)="updateList(i, 'toutmoney', row.toutmoney)">
      </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="taxmoney">
      <th mat-header-cell *matHeaderCellDef>消費税金額</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.taxmoney" (blur)="updateList(i, 'taxmoney', row.taxmoney)">
      </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="taxrate">
      <th mat-header-cell *matHeaderCellDef>消費税率</th>
      <td mat-cell *matCellDef="let row; let i = index">
      <mat-form-field>
        <input matInput [(ngModel)]="row.taxrate" (blur)="updateList(i, 'taxrate', row.taxrate)">
      </mat-form-field>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns;"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
  </div>
