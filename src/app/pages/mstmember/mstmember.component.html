<app-navbar></app-navbar>
<mat-toolbar color="primary" class="toolbar mat-elevation-z8">
    <div class="icon-area" fxLayout="row wrap" fxLayoutGap="5px">
        <mat-form-field fxFlex="0 0 10em">
            <mat-label>顧客コード</mat-label>
            <input matInput [ngModel]="mcd" (ngModelChange)="mcd=$event" (keyup.enter)="onEnter()" (keydown.f4)="mcdHelp()"
             (contextmenu)="contxtMenu()" (change)="refresh()" (blur)="refresh()" [ngModelOptions]="{standalone: true}" required>
             <!-- <mat-hint>顧客コード</mat-hint> -->
        </mat-form-field>
        <button mat-button (click)="mcdHelp()">
            <mat-icon>find_replace</mat-icon>
            顧客検索
        </button>
        <button mat-button (click)="setNext()">
            <mat-icon>keyboard_arrow_up</mat-icon>
            次
        </button>
        <button mat-button (click)="setPrev()">
            <mat-icon>keyboard_arrow_down</mat-icon>
            前
        </button>  
        <button mat-button (click)="diaBetsu()">
            <mat-icon>local_shipping</mat-icon>
            別納先マスタ
        </button>
        <button  mat-button (click)="test()">
            <mat-icon>scanner</mat-icon>
            刺繍データ
        </button>
        <button mat-button (click)="refresh()">
            <mat-icon>autorenew</mat-icon>
            再表示
        </button>
        <button mat-button><a mat-button href="https://mwj001-my.sharepoint.com/:x:/g/personal/asago00_mwj001_onmicrosoft_com/EdJVQxKeKFRCr0sV1ebScewBQX6bPjCc8acDLL5VzwsIJQ?e=5HEIZ5" target="_blank">
            <mat-icon>help</mat-icon>
            ヘルプ
        </a></button>
    </div>
</mat-toolbar>
<form [formGroup]="form" fxLayout="row wrap" fxLayoutGap="5px">
<mat-card fxFlex="50">
  <mat-card-header>
    <mat-card-title>
        基本情報
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form formGroupName="base" fxLayoutGap="5px">
      <mat-form-field>
        <mat-label>姓/会社名</mat-label>
        <input matInput formControlName="sei" required>
      </mat-form-field>
      <mat-form-field>
        <mat-label>名</mat-label>
        <input matInput formControlName="mei">
      </mat-form-field>
      <mat-form-field>
        <mat-label>フリガナ</mat-label>
        <input matInput formControlName="kana" required>
      </mat-form-field>
      <mat-form-field style="width:4em">
        <mat-label>単価区分</mat-label>
        <input matInput formControlName="tankakbn" required>
      </mat-form-field>
      <mat-form-field style="width:4em">
        <mat-label>入金予定初期値</mat-label>
        <input matInput formControlName="pay">
      </mat-form-field>
      <mat-form-field style="width:4em">
        <mat-label>配送方法初期値</mat-label>
        <input matInput formControlName="okuri">
      </mat-form-field>
      <mat-form-field style="width:4em">
        <mat-label>消費税区分</mat-label>
        <input matInput formControlName="mtax">
      </mat-form-field>
      <mat-form-field>
        <mat-label>営業担当</mat-label>
        <input matInput formControlName="tcode1">
      </mat-form-field>
      <mat-form-field>
        <mat-label>内勤担当</mat-label>
        <input matInput formControlName="tcode2">
      </mat-form-field>
      <mat-form-field style="width:4em">
        <mat-label>削除フラグ</mat-label>
        <input matInput formControlName="del">
      </mat-form-field>
      <mat-form-field>
        <mat-label>特別単価区分</mat-label>
        <input matInput formControlName="sptnkbn" size="2">
      </mat-form-field>
      <mat-form-field>
        <mat-label>備考</mat-label>
        <textarea matInput formControlName="bikou"></textarea>
      </mat-form-field>
      <mat-form-field>
        <mat-label>社内向け備考</mat-label>
        <textarea matInput formControlName="inbikou"></textarea>
      </mat-form-field>
    </form> 
  </mat-card-content> 
</mat-card>
<mat-card fxFlex="49">     
    <mat-card-header>
        <mat-card-title>
            自宅住所
        </mat-card-title>
    </mat-card-header>
    <app-address [formName]="'addr0'"></app-address>        
</mat-card>
<mat-accordion multi>
    <form formGroupName="kake">
        <mat-expansion-panel>        
            <mat-expansion-panel-header>
                <mat-label> 掛請求</mat-label>
                <input type="checkbox" formControlName="torikbn">                   
            </mat-expansion-panel-header> 
            <div fxLayoutGap="5px">
            <mat-form-field>
                <mat-label>締め日</mat-label>
                <input matInput formControlName="sime">
            </mat-form-field>
            <mat-form-field>
                <mat-label>入金サイト</mat-label>
                <input matInput formControlName="site">
            </mat-form-field>
            <mat-form-field>
                <mat-label>入金日</mat-label>
                <input matInput formControlName="inday">
            </mat-form-field>
            <mat-form-field>
                <mat-label>請求先コード</mat-label>
                <input matInput formControlName="icode">
            </mat-form-field>
            <mat-form-field>
              <mat-label>請求書送付先コード</mat-label>
              <input matInput formControlName="sscode">
            </mat-form-field>
          </div>
        </mat-expansion-panel>
    </form>
    <form formGroupName="mail">
      <mat-expansion-panel>
          <mat-expansion-panel-header>
            <!-- <div fxLayout="column" fxLayoutGap="5px"> -->
                <mat-form-field>
                  <mat-label>メールアドレス</mat-label>
                  <input matInput formControlName="mail">
                </mat-form-field>
            <!-- </div> -->
          </mat-expansion-panel-header> 
          <div fxLayout="row" fxLayoutGap="5px">
          <mat-form-field>
            <mat-label>メールアドレス2</mat-label>
            <input matInput formControlName="mail2">
          </mat-form-field>
          <mat-form-field>
            <mat-label>メールアドレス3</mat-label>
            <input matInput formControlName="mail3">
          </mat-form-field>
          <mat-form-field>
            <mat-label>メールアドレス4</mat-label>
            <input matInput formControlName="mail4">
          </mat-form-field>
          <mat-form-field>
            <mat-label>メールアドレス5</mat-label>
            <input matInput formControlName="mail5">
          </mat-form-field>
          </div>
      </mat-expansion-panel>
    </form>  
    <mat-expansion-panel>
        <mat-expansion-panel-header>
            <mat-panel-title>
            勤務先住所
            </mat-panel-title>
        </mat-expansion-panel-header>
        <app-address [formName]="'addr1'"></app-address>                
    </mat-expansion-panel>
</mat-accordion>
</form>
