<div class="mat-elevation-z8">
    <table mat-table [dataSource]="dataSource" aria-label="Elements">
          <ng-container matColumnDef="gcode">
            <th mat-header-cell *matHeaderCellDef>商品コード</th>
            <td mat-cell *matCellDef="let row" style="width:10em;">{{row.gcode}}</td>
          </ng-container>
          <ng-container matColumnDef="subname">
            <th mat-header-cell *matHeaderCellDef>商品名</th>
            <td mat-cell *matCellDef="let row">{{row.subname}}</td>
          </ng-container>
          <ng-container matColumnDef="size">
            <th mat-header-cell *matHeaderCellDef>サイズ</th>
            <td mat-cell *matCellDef="let row">{{row.size}}</td>
          </ng-container>
          <ng-container matColumnDef="color">
            <th mat-header-cell *matHeaderCellDef>色</th>
            <td mat-cell *matCellDef="let row">{{row.color}}</td>
          </ng-container>
          <ng-container matColumnDef="irisu">
            <th mat-header-cell *matHeaderCellDef>出荷数</th>
            <td mat-cell *matCellDef="let row" style="text-align: right;">{{row.irisu}}</td>
          </ng-container> 
          <ng-container matColumnDef="iriunit">
            <th mat-header-cell *matHeaderCellDef>単位</th>
            <td mat-cell *matCellDef="let row">{{row.iriunit}}</td>
          </ng-container>
          <ng-container matColumnDef="skbn">
            <th mat-header-cell *matHeaderCellDef>数量区分</th>
            <td mat-cell *matCellDef="let row">{{row.skbn}}</td>
          </ng-container>
          <ng-container matColumnDef="jan">
            <th mat-header-cell *matHeaderCellDef>janコード</th>
            <td mat-cell *matCellDef="let row">{{row.jan}}</td>
          </ng-container>
          <ng-container matColumnDef="weight">
            <th mat-header-cell *matHeaderCellDef>重量</th>
            <td mat-cell *matCellDef="let row">{{row.weight}}</td>
          </ng-container>
          <ng-container matColumnDef="tkbn">
            <th mat-header-cell *matHeaderCellDef>中止区分</th>
            <td mat-cell *matCellDef="let row">{{row.tkbn}}</td>
          </ng-container>
          <ng-container matColumnDef="zkbn">
            <th mat-header-cell *matHeaderCellDef>在庫区分</th>
            <td mat-cell *matCellDef="let row">{{row.zkbn}}</td>
          </ng-container>
          <ng-container matColumnDef="max">
            <th mat-header-cell *matHeaderCellDef>１個口最大</th>
            <td mat-cell *matCellDef="let row">{{row.max}}</td>
          </ng-container>
          <ng-container matColumnDef="send">
            <th mat-header-cell *matHeaderCellDef>送料区分</th>
            <td mat-cell *matCellDef="let row">{{row.send}}</td>
          </ng-container>
          <ng-container matColumnDef="order">
            <th mat-header-cell *matHeaderCellDef>受発注品</th>
            <td mat-cell *matCellDef="let row">{{row.order}}</td>
          </ng-container>
          <ng-container matColumnDef="koguchi">
            <th mat-header-cell *matHeaderCellDef>個口数</th>
            <td mat-cell *matCellDef="let row">{{row.koguchi}}</td>
          </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns;"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
</div>
